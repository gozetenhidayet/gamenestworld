<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Contact Us - GameNest World</title>
<meta name="description" content="Contact GameNest World. Report bugs, suggest new games, or send feedback.">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Inter',sans-serif;background:linear-gradient(135deg,#07050f,#1a1040,#0d1b2a);background-attachment:fixed;color:#fff;min-height:100vh;}
input,textarea,select{font-family:inherit;transition:border-color .2s;}
input:focus,textarea:focus,select:focus{border-color:#7c3aed!important;outline:none;box-shadow:0 0 0 3px rgba(124,58,237,.2);}
nav{background:rgba(7,5,15,.9);backdrop-filter:blur(20px);padding:0 20px;border-bottom:1px solid rgba(255,255,255,.1);position:sticky;top:0;z-index:100;}
</style>
</head>
<body>
<nav><div style="max-width:1160px;margin:0 auto;height:52px;display:flex;align-items:center;">
  <a href="/" style="font-size:20px;font-weight:900;color:#fff;text-decoration:none;"><span style="color:#a78bfa;">Game</span>Nest World</a>
  <div style="flex:1;"></div>
  <a href="/" style="color:rgba(255,255,255,.6);text-decoration:none;font-size:14px;">← All Games</a>
</div></nav>
<main style="max-width:580px;margin:0 auto;padding:60px 20px;">
  <h1 style="font-size:40px;font-weight:900;margin-bottom:8px;">Contact Us</h1>
  <p style="color:rgba(255,255,255,.5);font-size:15px;margin-bottom:32px;line-height:1.7;">Bug report, game suggestion, or feedback? We love hearing from players!</p>

  <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:28px;">
    <div style="background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:14px;padding:16px;text-align:center;">
      <div style="font-size:28px;margin-bottom:6px;">🐛</div>
      <div style="font-size:13px;font-weight:700;color:#fff;margin-bottom:3px;">Bug Report</div>
      <div style="font-size:11px;color:rgba(255,255,255,.4);">Game not working?</div>
    </div>
    <div style="background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.09);border-radius:14px;padding:16px;text-align:center;">
      <div style="font-size:28px;margin-bottom:6px;">💡</div>
      <div style="font-size:13px;font-weight:700;color:#fff;margin-bottom:3px;">Suggest a Game</div>
      <div style="font-size:11px;color:rgba(255,255,255,.4);">What should we add?</div>
    </div>
  </div>

  <form onsubmit="sendMsg(event)" style="display:flex;flex-direction:column;gap:14px;">
    <div>
      <label style="display:block;color:rgba(255,255,255,.6);font-size:12px;font-weight:700;margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em;">Your Name</label>
      <input type="text" id="cf-name" placeholder="Enter your name" required
        style="width:100%;padding:12px 14px;border-radius:10px;border:1.5px solid rgba(255,255,255,.12);background:rgba(255,255,255,.07);color:#fff;font-size:14px;">
    </div>
    <div>
      <label style="display:block;color:rgba(255,255,255,.6);font-size:12px;font-weight:700;margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em;">Email Address</label>
      <input type="email" id="cf-email" placeholder="your@email.com" required
        style="width:100%;padding:12px 14px;border-radius:10px;border:1.5px solid rgba(255,255,255,.12);background:rgba(255,255,255,.07);color:#fff;font-size:14px;">
    </div>
    <div>
      <label style="display:block;color:rgba(255,255,255,.6);font-size:12px;font-weight:700;margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em;">Type</label>
      <select id="cf-type"
        style="width:100%;padding:12px 14px;border-radius:10px;border:1.5px solid rgba(255,255,255,.12);background:rgba(21,16,50,.95);color:#fff;font-size:14px;">
        <option value="bug">🐛 Bug Report</option>
        <option value="suggest">💡 Game Suggestion</option>
        <option value="feedback">💬 General Feedback</option>
        <option value="ad">📢 Ad / AdSense Issue</option>
        <option value="other">📩 Other</option>
      </select>
    </div>
    <div>
      <label style="display:block;color:rgba(255,255,255,.6);font-size:12px;font-weight:700;margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em;">Message</label>
      <textarea id="cf-msg" rows="5" placeholder="Tell us more..." required
        style="width:100%;padding:12px 14px;border-radius:10px;border:1.5px solid rgba(255,255,255,.12);background:rgba(255,255,255,.07);color:#fff;font-size:14px;resize:vertical;"></textarea>
    </div>
    <button type="submit"
      style="padding:14px;border-radius:12px;background:linear-gradient(135deg,#7c3aed,#ec4899);border:none;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 4px 20px rgba(124,58,237,.4);transition:all .2s;">
      Send Message 🚀
    </button>
    <div id="cf-ok" style="display:none;background:rgba(16,185,129,.15);border:1px solid rgba(16,185,129,.3);border-radius:10px;padding:14px;text-align:center;color:#6ee7b7;font-weight:700;">
      ✅ Message sent! We will get back to you soon.
    </div>
  </form>
</main>
<footer style="background:linear-gradient(135deg,#1a0533,#1e1b4b);border-top:1px solid rgba(167,139,250,.2);padding:24px;text-align:center;margin-top:60px;">
  <p style="color:rgba(255,255,255,.3);font-size:12px;">© 2026 GameNest World ·
    <a href="/" style="color:rgba(255,255,255,.4);text-decoration:none;margin:0 8px;">Home</a>
    <a href="/privacy.html" style="color:rgba(255,255,255,.4);text-decoration:none;margin:0 8px;">Privacy</a>
    <a href="/terms.html" style="color:rgba(255,255,255,.4);text-decoration:none;margin:0 8px;">Terms</a>
  </p>
</footer>
<script>
function sendMsg(e){
  e.preventDefault();
  var btn=e.target.querySelector('button');
  btn.textContent='Sending...';btn.disabled=true;
  setTimeout(function(){
    document.getElementById('cf-ok').style.display='block';
    btn.textContent='Send Message 🚀';btn.disabled=false;
    e.target.reset();
  },1000);
}
</script>
</body>
</html>

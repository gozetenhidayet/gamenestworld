<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Contact — GameNest World</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Inter,sans-serif;background:#f0f4ff;color:#0f172a;line-height:1.7;}
nav{background:#fff;border-bottom:1px solid #e2e8f0;padding:12px 32px;}
.logo{font-family:'Plus Jakarta Sans',sans-serif;font-size:20px;font-weight:900;color:#6366f1;text-decoration:none;}
.logo span{color:#16a34a;font-size:12px;font-weight:700;background:#dcfce7;padding:2px 8px;border-radius:99px;margin-left:4px;}
.container{max-width:600px;margin:48px auto;padding:0 24px 80px;}
h1{font-family:'Plus Jakarta Sans',sans-serif;font-size:32px;font-weight:900;margin-bottom:8px;}
.sub{color:#64748b;font-size:16px;margin-bottom:36px;}
.form-group{margin-bottom:18px;}
label{display:block;font-size:13px;font-weight:600;color:#475569;margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em;}
input,textarea{width:100%;background:#fff;border:1.5px solid #e2e8f0;border-radius:10px;padding:11px 14px;font-size:15px;font-family:inherit;color:#0f172a;outline:none;transition:border-color .2s;}
input:focus,textarea:focus{border-color:#6366f1;}
textarea{height:140px;resize:vertical;}
.btn{background:#6366f1;color:#fff;border:none;border-radius:10px;padding:13px 28px;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .2s;width:100%;}
.btn:hover{background:#4f46e5;transform:translateY(-1px);}
.info-cards{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:32px;}
.info-card{background:#fff;border:1.5px solid #e2e8f0;border-radius:12px;padding:18px;}
.info-icon{font-size:24px;margin-bottom:8px;}
.info-title{font-weight:700;font-size:14px;margin-bottom:4px;}
.info-val{font-size:13px;color:#64748b;}
.back{display:inline-flex;align-items:center;gap:6px;color:#6366f1;text-decoration:none;font-weight:600;margin-bottom:28px;font-size:14px;}
</style>
</head>
<body>
<nav><a href="/" class="logo">GameNest <span>World</span></a></nav>
<div class="container">
<a href="/" class="back">← Back to Games</a>
<h1>Contact Us</h1>
<p class="sub">Have a question, suggestion or found a bug? We'd love to hear from you!</p>
<div class="info-cards">
  <div class="info-card"><div class="info-icon">📧</div><div class="info-title">Email</div><div class="info-val">hello@gamenestworld.com</div></div>
  <div class="info-card"><div class="info-icon">⚡</div><div class="info-title">Response Time</div><div class="info-val">Within 24–48 hours</div></div>
</div>
<div class="form-group"><label>Your Name</label><input type="text" placeholder="John Doe"></div>
<div class="form-group"><label>Email Address</label><input type="email" placeholder="john@example.com"></div>
<div class="form-group"><label>Subject</label>
  <select style="width:100%;background:#fff;border:1.5px solid #e2e8f0;border-radius:10px;padding:11px 14px;font-size:15px;font-family:inherit;color:#0f172a;outline:none;">
    <option>General Question</option>
    <option>Bug Report</option>
    <option>Game Suggestion</option>
    <option>Partnership / Advertising</option>
    <option>Other</option>
  </select>
</div>
<div class="form-group"><label>Message</label><textarea placeholder="Tell us what's on your mind..."></textarea></div>
<button class="btn" onclick="alert('✅ Thank you! We will get back to you within 24 hours.')">Send Message →</button>
</div>
</body>
</html>
